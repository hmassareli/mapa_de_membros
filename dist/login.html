<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa de Membros - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e3a5f 50%,
          #0f172a 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .login-card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 400px;
        width: 100%;
        overflow: hidden;
      }
      .login-header {
        background: linear-gradient(135deg, #1e3a5f, #3b82f6);
        padding: 32px;
        text-align: center;
        color: white;
      }
      .login-header .logo {
        font-size: 48px;
        margin-bottom: 8px;
      }
      .login-header h1 {
        font-size: 22px;
        font-weight: 600;
      }
      .login-header p {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 6px;
      }

      .login-body {
        padding: 32px;
      }

      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #475569;
        margin-bottom: 5px;
      }
      .form-group input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .form-group input:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      }

      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s;
        background: #3b82f6;
        color: white;
        margin-top: 8px;
      }
      .btn:hover {
        background: #2563eb;
      }
      .btn:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      .error-msg {
        background: #fef2f2;
        color: #dc2626;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }
      .error-msg.visible {
        display: block;
      }

      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-header">
        <div class="logo">🗺️</div>
        <h1>Mapa de Membros</h1>
        <p>Faça login para acessar o mapa da sua ala</p>
      </div>

      <div class="login-body">
        <div class="error-msg" id="errorMsg"></div>

        <form onsubmit="fazerLogin(event)">
          <div class="form-group">
            <label>Login</label>
            <input
              type="text"
              id="inputUsername"
              placeholder="Login da ala"
              autocomplete="username"
              autofocus
            />
          </div>
          <div class="form-group">
            <label>Senha</label>
            <input
              type="password"
              id="inputSenha"
              placeholder="Senha"
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="btn" id="btnLogin">Entrar</button>
        </form>

        <div
          style="
            text-align: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
          "
        >
          <p style="font-size: 13px; color: #94a3b8; margin-bottom: 6px">
            Sua ala ainda não tem conta?
          </p>
          <a
            href="/setup.html"
            style="
              font-size: 14px;
              color: #3b82f6;
              text-decoration: none;
              font-weight: 600;
            "
            >Cadastrar nova ala →</a
          >
        </div>
      </div>
    </div>

    <script>
      async function fazerLogin(e) {
        e.preventDefault();

        const username = document.getElementById("inputUsername").value.trim();
        const senha = document.getElementById("inputSenha").value;

        if (!username || !senha) {
          showError("Preencha login e senha");
          return;
        }

        const btn = document.getElementById("btnLogin");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Entrando...';

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, senha }),
          });
          const data = await res.json();

          if (!res.ok) {
            showError(data.erro || "Erro ao fazer login");
            btn.disabled = false;
            btn.textContent = "Entrar";
            return;
          }

          // Login OK — redirecionar para o mapa
          window.location.href = "/";
        } catch (err) {
          showError("Erro de conexão: " + err.message);
          btn.disabled = false;
          btn.textContent = "Entrar";
        }
      }

      function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.classList.add("visible");
      }

      // Se já está logado, ir direto pro mapa
      fetch("/api/auth/me")
        .then((r) => {
          if (r.ok) window.location.href = "/";
        })
        .catch(() => {});
    </script>
  </body>
</html>
